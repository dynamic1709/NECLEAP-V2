<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="NEC LEAP - A centralized academic PDF resource portal for NEC students. Browse, download, and share study materials organized by branch, year, semester, and subject." />
    <meta name="keywords" content="NEC, LEAP, PDF, study materials, notes, engineering, college" />
    <meta property="og:title" content="NEC LEAP - Academic Resource Portal" />
    <meta property="og:description" content="Browse and download study materials organized by branch, year, semester, and subject." />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#18181b" />
    <title>NEC LEAP</title>
    <script>
      (function() {
        const saved = localStorage.getItem('necleap-theme');
        const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
